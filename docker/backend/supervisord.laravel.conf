[program:php-fpm]
process_name = %(program_name)s_%(process_num)s
command = php-fpm -F
user = www-data
autostart = true
autorestart = true
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0

[program:worker]
process_name = %(program_name)s_%(process_num)s
command = php /usr/share/nginx/html/laravel/artisan queue:work --tries=3 --sleep=3 --max-time=3600
user = www-data
autostart = true
autorestart = true
numprocs=2
stopwaitsecs=3600
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0

[program:reverb]
process_name=%(program_name)s_%(process_num)s
command=php /usr/share/nginx/html/laravel/artisan reverb:start
user = www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/usr/share/nginx/html/laravel/storage/logs/reverb.log
stdout_logfile_maxbytes=20MB

[program:scheduler]
process_name = %(program_name)s_%(process_num)s
command = supercronic -overlapping /etc/supercronic/laravel
user = www-data
autostart = true
autorestart = true
stdout_logfile = /usr/share/nginx/html/laravel/storage/logs/scheduler.log
stdout_logfile_maxbytes = 20MB
stderr_logfile = /usr/share/nginx/html/laravel/storage/logs/scheduler.log
stderr_logfile_maxbytes = 20MB

[program:clear-scheduler-cache]
process_name = %(program_name)s_%(process_num)s
command = php /usr/share/nginx/html/laravel schedule:clear-cache
user = www-data
autostart = true
autorestart = false
startsecs = 0
startretries = 1
stdout_logfile = /usr/share/nginx/html/laravel/storage/logs/scheduler.log
stdout_logfile_maxbytes = 20MB
stderr_logfile = /usr/share/nginx/html/laravel/storage/logs/scheduler.log
stderr_logfile_maxbytes = 20MB

[include]
files = /etc/supervisord.conf
